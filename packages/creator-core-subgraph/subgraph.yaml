specVersion: 0.0.4
description: Creator-Core Subgraph — indexes Manifold creator-core events
repository: https://github.com/mxjxn/cryptoart-studio
schema:
  file: ./schema.graphql
dataSources:
  # ============================================================
  # ERC721 Creator Core — starts as a template, instantiated per contract
  # ============================================================
  - kind: ethereum
    name: ERC721Creator
    network: sepolia
    source:
      # Placeholder — will be replaced when deploying for real contracts
      address: "0x0000000000000000000000000000000000000000"
      abi: ERC721
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CreatorContract
        - Token
        - TransferEvent
      abis:
        - name: ERC721
          file: ./abis/ERC721.json
        - name: ICreatorCore
          file: ./abis/ICreatorCore.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/erc721-mapping.ts

  # ============================================================
  # ERC1155 Creator Core — template for ERC1155 contracts
  # ============================================================
  - kind: ethereum
    name: ERC1155Creator
    network: sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ERC1155
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CreatorContract
        - Token
        - TransferEvent
      abis:
        - name: ERC1155
          file: ./abis/ERC1155.json
        - name: ICreatorCore
          file: ./abis/ICreatorCore.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
      file: ./src/erc1155-mapping.ts

  # ============================================================
  # Creator Core Extensions — shared across both token standards
  # ============================================================
  - kind: ethereum
    name: CreatorCoreExtensions
    network: sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ICreatorCore
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CreatorContract
        - Extension
        - RoyaltyOverride
      abis:
        - name: ICreatorCore
          file: ./abis/ICreatorCore.json
      eventHandlers:
        - event: ExtensionRegistered(indexed address,indexed address)
          handler: handleExtensionRegistered
        - event: ExtensionUnregistered(indexed address,indexed address)
          handler: handleExtensionUnregistered
        - event: ExtensionBlacklisted(indexed address,indexed address)
          handler: handleExtensionBlacklisted
        - event: MintPermissionsUpdated(indexed address,indexed address,indexed address)
          handler: handleMintPermissionsUpdated
        - event: ExtensionApproveTransferUpdated(indexed address,bool)
          handler: handleExtensionApproveTransferUpdated
        - event: DefaultRoyaltiesUpdated(address[],uint256[])
          handler: handleDefaultRoyaltiesUpdated
        - event: RoyaltiesUpdated(indexed uint256,address[],uint256[])
          handler: handleRoyaltiesUpdated
        - event: ExtensionRoyaltiesUpdated(indexed address,address[],uint256[])
          handler: handleExtensionRoyaltiesUpdated
      file: ./src/extension-mapping.ts
